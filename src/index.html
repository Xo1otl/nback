<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0b0b" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./favicon.svg" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <title>n-back</title>
    <script>
      // Apply the saved / OS theme before first paint to avoid a flash. Mirrors
      // STORAGE_KEY + the resolution in src/lib/theme.ts — keep them in sync.
      // The static class="dark" on <html> is the no-JS fallback.
      (function () {
        try {
          var stored = localStorage.getItem("nback.theme.v1");
          var dark =
            stored === "dark" ||
            (stored !== "light" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute("content", dark ? "#0b0b0b" : "#ffffff");
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./frontend.tsx"></script>
  </body>
</html>
